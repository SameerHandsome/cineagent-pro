<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineAgent Pro — AI Film Pre-Production</title>
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-container">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">🎬</div>
      <h1 class="brand-name">CineAgent Pro</h1>
      <p class="brand-tagline">AI-powered pre-production intelligence</p>
    </div>

    <!-- Tab switcher -->
    <div class="tab-bar">
      <button class="tab active" data-tab="login">Sign In</button>
      <button class="tab" data-tab="register">Create Account</button>
    </div>

    <!-- Login Form -->
    <form class="auth-form" id="login-form">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@studio.com" required />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required />
      </div>
      <div class="error-msg" id="login-error"></div>
      <button type="submit" class="btn-primary" id="login-btn">
        <span class="btn-text">Sign In</span>
        <span class="btn-spinner hidden">⟳</span>
      </button>
    </form>

    <!-- Register Form -->
    <form class="auth-form hidden" id="register-form">
      <div class="form-group">
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" placeholder="Your name" required />
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="you@studio.com" required />
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="Min 8 characters" required />
      </div>
      <div class="error-msg" id="register-error"></div>
      <button type="submit" class="btn-primary" id="register-btn">
        <span class="btn-text">Create Account</span>
        <span class="btn-spinner hidden">⟳</span>
      </button>
    </form>

    <!-- Divider -->
    <div class="divider"><span>or</span></div>

    <!-- GitHub OAuth -->
    <a href="http://localhost:8000/auth/github" class="btn-github">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
      Continue with GitHub
    </a>

  </div>

  <script src="js/auth.js"></script>
</body>
</html>
