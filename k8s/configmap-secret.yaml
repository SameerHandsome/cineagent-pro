# ══════════════════════════════════════════════════════════════════════════════
# ConfigMap — non-sensitive runtime config
# Secret     — sensitive keys (base64 encoded in real deployment)
#
# HOW TO USE:
#   1. Copy this file, fill in the Secret values with base64-encoded strings:
#         echo -n "your-value" | base64
#   2. Apply:
#         kubectl apply -f k8s/configmap-secret.yaml -n cineagent
#
# In CI/CD (GitHub Actions), secrets are injected via environment variables
# using `kubectl create secret generic` — never commit real values here.
# ══════════════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: ConfigMap
metadata:
  name: cineagent-config
  namespace: cineagent
data:
  APP_ENV: "production"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  GROQ_MODEL: "llama-3.3-70b-versatile"
  QDRANT_COLLECTION: "cineagent_sessions"
  MCP_SERVER_URL: "http://mcp-server-service:8001"
  FRONTEND_ORIGIN: "https://your-domain.com"
  LANGCHAIN_TRACING_V2: "true"
  LANGCHAIN_PROJECT: "cineagent-pro"

---
apiVersion: v1
kind: Secret
metadata:
  name: cineagent-secrets
  namespace: cineagent
type: Opaque
data:
  # Replace all values with: echo -n "actual-value" | base64
  SECRET_KEY: <base64-encoded-secret-key>
  GROQ_API_KEY: <base64-encoded-groq-api-key>
  DATABASE_URL: <base64-encoded-neon-postgresql-url>
  UPSTASH_REDIS_REST_URL: <base64-encoded-upstash-url>
  UPSTASH_REDIS_REST_TOKEN: <base64-encoded-upstash-token>
  REDIS_URL: <base64-encoded-redis-url>
  QDRANT_URL: <base64-encoded-qdrant-url>
  QDRANT_API_KEY: <base64-encoded-qdrant-key>
  GITHUB_CLIENT_ID: <base64-encoded-github-client-id>
  GITHUB_CLIENT_SECRET: <base64-encoded-github-client-secret>
  GITHUB_TOKEN: <base64-encoded-github-token>
  TAVILY_API_KEY: <base64-encoded-tavily-key>
  LANGCHAIN_API_KEY: <base64-encoded-langsmith-key>
