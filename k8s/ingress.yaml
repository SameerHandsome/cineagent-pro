# ══════════════════════════════════════════════════════════════════════════════
# Ingress — routes external traffic to backend
# Requires: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/...
# Replace "your-domain.com" with your actual domain or use an IP.
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cineagent-ingress
  namespace: cineagent
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"      # SSE streaming timeout
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"         # required for SSE
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
spec:
  ingressClassName: nginx
  rules:
    - host: your-domain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80
          - path: /health
            pathType: Exact
            backend:
              service:
                name: backend-service
                port:
                  number: 80
