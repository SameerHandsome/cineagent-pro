[tool.black]
line-length = 100
target-version = ["py311"]
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | __pycache__
  | node_modules
)/
'''

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [".git", "__pycache__", "venv", ".venv", "node_modules"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]   # pycodestyle errors, pyflakes, isort
ignore = [
    "E501",   # line too long — black handles this
    "F401",   # unused import — too noisy in __init__.py files
]
