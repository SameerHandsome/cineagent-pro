[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: Unit tests (no external services)
    integration: Integration tests (full pipeline with mocks)
    slow: Slow tests (skipped in CI fast pass)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
